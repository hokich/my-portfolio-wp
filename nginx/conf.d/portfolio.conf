server {
    listen 80;
    server_name paul-blumen.de www.paul-blumen.de;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://paul-blumen.de$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name www.paul-blumen.de;

    ssl_certificate /etc/letsencrypt/live/paul-blumen.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/paul-blumen.de/privkey.pem;

    return 301 https://paul-blumen.de$request_uri;
}

server {
    listen 443 ssl;
    server_name paul-blumen.de;

    ssl_certificate /etc/letsencrypt/live/paul-blumen.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/paul-blumen.de/privkey.pem;

    location / {
        proxy_pass http://my-portfolio-wordpress:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}