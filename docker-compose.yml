services:
  my-portfolio-db:
    image: mysql:8.0
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - db_data:/var/lib/mysql

  my-portfolio-wordpress:
    image: wordpress:6.9.1-php8.3-apache
    restart: unless-stopped
    depends_on:
      - my-portfolio-db
    ports:
      - "8080:80"
    env_file:
      - .env
    volumes:
      - ./wp-content:/var/www/html/wp-content

  my-portfolio-phpmyadmin:
    image: phpmyadmin:5
    restart: unless-stopped
    depends_on:
      - my-portfolio-db
    ports:
      - "8081:80"
    environment:
      PMA_HOST: my-portfolio-db
      PMA_PORT: 3306

volumes:
  db_data: