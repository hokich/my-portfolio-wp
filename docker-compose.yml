services:
  my-portfolio-db:
    image: mysql:8.0
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - db_data:/var/lib/mysql

  my-portfolio-wordpress:
    image: wordpress:6.9.1-php8.3-apache
    restart: unless-stopped
    depends_on:
      - my-portfolio-db
    ports:
      - "8080:80"
    env_file:
      - .env
    volumes:
      - ./wp-content:/var/www/html/wp-content

  my-portfolio-phpmyadmin:
    image: phpmyadmin:5
    restart: unless-stopped
    depends_on:
      - my-portfolio-db
    ports:
      - "8081:80"
    environment:
      PMA_HOST: my-portfolio-db
      PMA_PORT: 3306

  nginx:
    image: nginx:stable
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/certs:/etc/letsencrypt
      - ./wp-content:/var/www/html/wp-content
      - ./nginx/certbot-webroot:/var/www/certbot
    depends_on:
      - my-portfolio-wordpress

  certbot:
    image: certbot/certbot
    volumes:
      - ./nginx/certs:/etc/letsencrypt
      - ./nginx/certbot-webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  db_data: